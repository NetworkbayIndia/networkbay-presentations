<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400, initial-scale=1">
<title>Stadium365 — HPCA Dharamshala</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@300;400;500;600&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#EA5050;--ink:#1C1C1C;--white:#fff;--paper:#F7F7F7;
  --border:rgba(0,0,0,0.09);--muted:rgba(0,0,0,0.38);
  --green:#22C55E;--font:'Schibsted Grotesk','Hanken Grotesk',system-ui,sans-serif;
  --nb:'Hanken Grotesk',system-ui,sans-serif;--ease:cubic-bezier(.2,.7,.2,1);
}
html,body{height:100%;font-family:var(--font);color:var(--ink);background:var(--paper);font-size:13px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
#topbar{display:flex;align-items:center;justify-content:space-between;background:#111;height:52px;padding:0 20px;flex-shrink:0}
.nb-logo{display:flex;flex-direction:column;gap:2px;line-height:1;cursor:pointer}
.nb-wm{font-family:var(--nb);font-weight:300;font-size:14px;color:#fff;letter-spacing:.01em}
.nb-sp{font-family:var(--font);font-weight:700;font-size:7px;color:#fff;letter-spacing:.25em;text-transform:uppercase}
.tb-div{width:1px;height:22px;background:rgba(255,255,255,.12);margin:0 16px}
.tb-prod{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em}
.tb-prod span{color:var(--red)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-venue{font-size:11px;color:rgba(255,255,255,.35);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.tb-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.tb-st{font-size:11px;color:rgba(255,255,255,.35);font-weight:500}

/* KPI STRIP */
#kpi{display:grid;grid-template-columns:repeat(4,1fr);background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.kc{padding:14px 22px;border-right:1px solid var(--border)}
.kc:last-child{border-right:none}
.kl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.kn{font-size:27px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1}
.kn.red{color:var(--red)}
.ks{font-size:11px;color:var(--muted);margin-top:3px}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* SIDEBAR */
#sb{width:236px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sbh{padding:10px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.sbov{font-size:10px;font-weight:600;color:var(--muted);cursor:pointer}
.sbov:hover{color:var(--ink)}
.sbgrp{padding:7px 12px 4px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--paper);border-bottom:1px solid var(--border)}
.pr{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 80ms}
.pr:hover:not(.act){background:var(--paper)}
.pr.act{background:#111}
.pr.off .pcode,.pr.off .pname,.pr.off .prev{opacity:.35}
.pcode{font-size:10px;font-weight:700;color:var(--muted);min-width:26px;letter-spacing:.04em;flex-shrink:0}
.pr.act .pcode{color:var(--red)}
.pname{font-size:12px;font-weight:500;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr.act .pname{color:#fff}
.prev{font-size:12px;font-weight:600;color:var(--ink);min-width:50px;text-align:right;flex-shrink:0}
.pr.act .prev{color:rgba(255,255,255,.9)}
.tog{width:28px;height:16px;border-radius:8px;display:flex;align-items:center;padding:2px;cursor:pointer;flex-shrink:0;transition:background 150ms}
.tog.on{background:var(--green)}
.tog.off{background:rgba(0,0,0,.15)}
.pr.act .tog.off{background:rgba(255,255,255,.2)}
.togdot{width:12px;height:12px;border-radius:50%;background:#fff;transition:transform 150ms var(--ease)}
.tog.on .togdot{transform:translateX(12px)}

/* PANEL */
#panel{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}

/* OVERVIEW */
.ov{padding:28px 28px 40px}
.ovs{margin-bottom:28px}
.ovt{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}

/* CARDS GRID */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:28px}
.card{background:var(--white);padding:18px 18px 16px;cursor:pointer;transition:background 100ms}
.card:hover{background:#F2F2F2}
.card.coff{background:var(--paper)}
.card.coff:hover{background:#EFEFEF}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ccode{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.07em}
.card.coff .ccode{color:var(--muted)}
.cpill{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border:1px solid}
.cpill.on{color:var(--green);border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.07)}
.cpill.off{color:var(--muted);border-color:var(--border)}
.cname{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.01em;margin-bottom:2px;line-height:1.25}
.card.coff .cname{color:rgba(0,0,0,.3)}
.cdesc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:14px}
.card.coff .cdesc{opacity:.5}
.cnum{font-size:24px;font-weight:600;color:var(--ink);letter-spacing:-.03em;line-height:1}
.card.coff .cnum{color:rgba(0,0,0,.2)}
.cnuml{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
.cbot{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.cstat{font-size:11px;font-weight:600;color:var(--muted)}
.cstat span{color:var(--ink)}
.card.coff .cstat span{color:rgba(0,0,0,.25)}
.cpb{font-size:11px;font-weight:700;color:var(--red)}
.card.coff .cpb{color:rgba(0,0,0,.2)}

/* PRECINCT CARD — full-width, split layout */
.card.precinct{grid-column:1/-1;display:grid;grid-template-columns:1fr 2fr;gap:0;padding:0}
.pc-main{padding:18px 20px 16px;border-right:1px solid var(--border);cursor:pointer}
.pc-main:hover{background:#F2F2F2}
.pc-subs{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.pc-sub{background:var(--white);padding:14px 14px;cursor:pointer;transition:background 100ms}
.pc-sub:hover{background:#F2F2F2}
.pc-sub.poff{background:var(--paper)}
.psc{font-size:9px;font-weight:700;color:var(--red);letter-spacing:.07em;margin-bottom:4px}
.pc-sub.poff .psc{color:var(--muted)}
.psn{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:6px;line-height:1.3}
.psv{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.pc-sub.poff .psv{color:rgba(0,0,0,.2)}

/* 5-YEAR TABLE */
.ytable{width:100%;border-collapse:collapse;border:1px solid var(--border)}
.ytable th{background:#111;color:#fff;font-size:10px;font-weight:600;padding:9px 14px;text-align:right;letter-spacing:.04em;text-transform:uppercase}
.ytable th:first-child{text-align:left}
.ytable td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;text-align:right;color:var(--ink)}
.ytable td:first-child{text-align:left;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.ytable tr.er td{color:var(--red);font-weight:600}
.ytable tr.tr td{background:var(--paper);font-weight:700;font-size:14px}
.ytable tr.tr td:first-child{font-size:10px}

/* PRODUCT DETAIL */
.pd{flex:1;display:flex;flex-direction:column;min-height:0}
.pdh{padding:18px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--white)}
.pdey{font-size:9px;font-weight:700;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.pdtit{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1.15}
.pdsub{font-size:12px;color:var(--muted);margin-top:3px}
.pdtog{display:flex;align-items:center;gap:9px;margin-top:6px}
.pdtogl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.bigt{width:38px;height:21px;border-radius:10px;display:flex;align-items:center;padding:3px;cursor:pointer;transition:background 150ms;flex-shrink:0}
.bigt.on{background:var(--green)}
.bigt.off{background:rgba(0,0,0,.18)}
.bigtdot{width:15px;height:15px;border-radius:50%;background:#fff;transition:transform 150ms var(--ease)}
.bigt.on .bigtdot{transform:translateX(17px)}
.pdbody{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:auto;min-height:0}
.pdcol{padding:20px 24px;overflow-y:auto}
.pdcol.left{border-right:1px solid var(--border)}
.coltit{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.seclbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.seclbl:first-child{margin-top:0;border-top:none;padding-top:0}
.slg{margin-bottom:14px}
.slr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sll{font-size:12px;font-weight:500;color:var(--ink);line-height:1.3}
.slv{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;margin-left:8px}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;appearance:none;background:rgba(0,0,0,.12);outline:none;cursor:pointer;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:2.5px solid var(--ink);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:2.5px solid var(--ink);cursor:pointer}
.ogrid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:14px}
.ogrid.c2{grid-template-columns:1fr 1fr}
.ogrid.c3{grid-template-columns:1fr 1fr 1fr}
.oc{background:var(--white);padding:12px 14px}
.oc.hero{background:#111}
.ocl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.oc.hero .ocl{color:rgba(255,255,255,.4)}
.ocn{font-size:21px;font-weight:600;color:var(--ink);letter-spacing:-.025em;line-height:1}
.oc.hero .ocn{color:#fff}
.ocs{font-size:10px;color:var(--muted);margin-top:2px}
.oc.hero .ocs{color:rgba(255,255,255,.3)}
.ystrip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:14px}
.yc{background:var(--white);padding:10px 11px}
.yc.y1{background:#111}
.ycl{font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--muted);margin-bottom:2px;text-transform:uppercase}
.yc.y1 .ycl{color:rgba(255,255,255,.4)}
.ycn{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.yc.y1 .ycn{color:#fff}
.yce{font-size:10px;color:var(--red);font-weight:600;margin-top:1px}
.yc.y1 .yce{color:#ff9090}
.cxrow{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:14px}
.cx{background:var(--paper);padding:11px 14px}
.cxl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.cxn{font-size:19px;font-weight:600;color:var(--ink);letter-spacing:-.025em}
.cxs{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
.notebox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);padding:10px 14px;margin-bottom:14px;font-size:11px;color:#92400e;line-height:1.5}
.pdfooter{border-top:1px solid var(--border);padding:10px 26px;display:flex;justify-content:space-between;align-items:center;background:var(--paper);flex-shrink:0}
.pdnav{font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:color 100ms}
.pdnav:hover{color:var(--ink)}
.pdhint{font-size:10px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.offst{padding:48px 28px;text-align:center}
.offst h3{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:8px}
.offst p{font-size:13px;color:var(--muted);line-height:1.5;max-width:280px;margin:0 auto}

/* PRECINCT DETAIL KPI BAR */
.pkbar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:16px}
.pk{background:var(--white);padding:12px 14px}
.pk.hero{background:#111}
.pkl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.pk.hero .pkl{color:rgba(255,255,255,.4)}
.pkn{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.025em}
.pk.hero .pkn{color:#fff}
.pkn.red{color:var(--red)}
.pks{font-size:10px;color:var(--muted);margin-top:2px}
/* per-product block inside precinct */
.ppblk{border-top:2px solid var(--border);padding-top:14px;margin-top:16px}
.ppblk:first-child{border-top:none;margin-top:0;padding-top:0}
.ppblkh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ppblkt{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink)}
.ppblkv{font-size:13px;font-weight:700;color:var(--red)}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <div style="display:flex;align-items:center">
    <div class="nb-logo" id="logo-home">
      <div class="nb-wm">networkbay</div>
      <div class="nb-sp">sports</div>
    </div>
    <div class="tb-div"></div>
    <div class="tb-prod">Stadium<span>365</span></div>
    <div class="tb-div"></div>
    <div class="tb-venue">HPCA Dharamshala</div>
  </div>
  <div class="tb-right">
    <div class="tb-dot"></div>
    <div class="tb-st">Indicative model · June 2026</div>
  </div>
</div>

<div id="kpi">
  <div class="kc"><div class="kl">Year 1 revenue</div><div class="kn" id="ky1">—</div><div class="ks" id="ky1s">—</div></div>
  <div class="kc"><div class="kl">5-year revenue</div><div class="kn" id="k5r">—</div><div class="ks">FY2027 – FY2031</div></div>
  <div class="kc"><div class="kl">5-year EBITDA</div><div class="kn red" id="k5e">—</div><div class="ks" id="kem">—</div></div>
  <div class="kc"><div class="kl">Total capex</div><div class="kn red" id="kcx">—</div><div class="ks" id="kpb">—</div></div>
</div>

<div id="main">
  <div id="sb"></div>
  <div id="panel"></div>
</div>

</div><!-- #app -->

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
var S = {
  view: 'overview',
  toggles: { P1:1, P2:0, P3:1, P4:1, P5:1, P6:1, P7:1, P8:0, F1:1 },
  a: {
    visitors: 2000,
    P1:{ cap:.60, adultP:600, childP:400, adultPct:.60, days:200, actCap:.40, actSpend:400, audRate:.20, audPrice:150, opex:.40, grow:.08 },
    P2:{ capRate:.15, spend:350, pkgs:15, pkgVal:15000, days:300, opex:.50, grow:.10 },
    P3:{ tours:15, pax:10, price:200, days:200, opex:.25, grow:.05 },
    P4:{ uc1G:30, uc1P:25000, uc1D:2, uc1E:20, uc2G:200, uc2P:12000, uc2E:10, opex:.40, grow:.15 },
    P5:{ covers:80, spend:1000, days:280, uplift:1.5, matchDays:10, fixedFee:200000, sharePct:.20, threshold:1000000, opex:.15, grow:.08 },
    P6:{ t1w:12, t1f:400000, t2w:6, t2f:1800000, opex:.30, grow:.15 },
    P7:{ events:15, hire:1200000, opex:.35, grow:.10 },
    P8:{ members:200, fee:50000, memGrow:50, opex:.20, grow:.05 },
    F1:{ matches:5, matchRev:30000000, naming:7500000, boxes:17, boxFee:1000000, opex:.10, grow:.08 }
  }
};

var CODES = ['P1','P2','P3','P4','P5','P6','P7','P8','F1'];
var PRECINCT = ['P4','P5','P7','P8'];

var META = {
  P1:{ name:'Cricket museum',    full:'Cricket Experience Centre',     sub:'Entry · activity zone · audio tour · 200 days/yr' },
  P2:{ name:'FEC',               full:'Family Entertainment Centre',   sub:'Standalone entertainment venue · new build' },
  P3:{ name:'Stadium tour',      full:'Stadium Tour',                  sub:'Guided add-on · groups of 10 · ₹200/head' },
  P4:{ name:'Corporate retreat', full:'Corporate Retreat & Conference', sub:'UC1 offsite program + UC2 cricket day events' },
  P5:{ name:'The Pavilion',      full:'The Pavilion — All-Day Dining', sub:'F&B operator lease · fixed fee + revenue share' },
  P6:{ name:'HP training',       full:'High-Performance Training',     sub:'Cricket residency camps · altitude facility hire' },
  P7:{ name:'Weddings & events', full:'Weddings & Special Events',     sub:'Venue hire · outfield + banquet hall' },
  P8:{ name:'VIP membership',    full:'VIP Membership Club',           sub:'Access layer · existing boxes and facilities' },
  F1:{ name:'Foundation',        full:'Foundation — In-Stadia Revenue', sub:'Box packages · naming rights · intl matches' }
};

// ── CALC ─────────────────────────────────────────────────────────────────────
function rev1(c) {
  if (!S.toggles[c]) return 0;
  var a = S.a, v = a.visitors;
  if (c==='P1') { var p=a.P1, bl=p.adultPct*p.adultP+(1-p.adultPct)*p.childP; return v*p.cap*bl*p.days + v*p.cap*p.actCap*p.actSpend*p.days + v*p.cap*p.audRate*p.audPrice*p.days; }
  if (c==='P2') { var p=a.P2; return v*p.capRate*p.spend*p.days + p.pkgs*12*p.pkgVal; }
  if (c==='P3') { var p=a.P3; return p.tours*p.pax*p.price*p.days; }
  if (c==='P4') { var p=a.P4; return p.uc1G*p.uc1P*p.uc1D*p.uc1E + p.uc2G*p.uc2P*p.uc2E; }
  if (c==='P5') { var p=a.P5, gross=p.covers*p.spend*(p.days-p.matchDays)+p.covers*p.spend*p.uplift*p.matchDays; return p.fixedFee*12+Math.max(0,(gross-p.threshold)*p.sharePct); }
  if (c==='P6') { var p=a.P6; return p.t1w*p.t1f+p.t2w*p.t2f; }
  if (c==='P7') { var p=a.P7; return p.events*p.hire; }
  if (c==='P8') { var p=a.P8; return p.members*p.fee; }
  if (c==='F1') { var p=a.F1; return p.boxes*p.boxFee; }
  return 0;
}

function rev5(c) {
  if (!S.toggles[c]) return [0,0,0,0,0];
  var r = rev1(c);
  if (c==='F1') { var p=S.a.F1, y2=r*(1+p.grow)+p.matches*p.matchRev+p.naming; return [r,y2,y2*(1+p.grow),y2*(1+p.grow)*(1+p.grow),y2*(1+p.grow)*(1+p.grow)*(1+p.grow)]; }
  if (c==='P8') { var p=S.a.P8; return [1,2,3,4,5].map(function(y){ return (p.members+(y-1)*p.memGrow)*(p.fee*Math.pow(1+p.grow,y-1)); }); }
  var g = S.a[c] ? S.a[c].grow : 0;
  return [0,1,2,3,4].map(function(i){ return r*Math.pow(1+g,i); });
}

function ebitda5(c) { var op=S.a[c]?S.a[c].opex:0; return rev5(c).map(function(v){ return v*(1-op); }); }

function totalRev5() { return [0,1,2,3,4].map(function(i){ return CODES.reduce(function(s,c){ return s+rev5(c)[i]; },0); }); }
function totalE5()   { return [0,1,2,3,4].map(function(i){ return CODES.reduce(function(s,c){ return s+ebitda5(c)[i]; },0); }); }

function totalCapex() {
  var FIT=4500, t=0;
  if (S.toggles.P1) t+=(18500+18500)*FIT;
  if (S.toggles.P2) t+=(10000+10000)*FIT;
  if (S.toggles.P4||S.toggles.P7) t+=(5000+5425+3500)*FIT;
  if (S.toggles.P4||S.toggles.P7||S.toggles.P8) t+=3264*FIT;
  if (S.toggles.P6) t+=120000000;
  if (S.toggles.F1) t+=800000000;
  return t;
}

function prodCapex(c) {
  var FIT=4500;
  if (c==='P1') return (18500+18500)*FIT;
  if (c==='P2') return (10000+10000)*FIT;
  if (c==='P6') return 120000000;
  if (c==='F1') return 800000000;
  return null;
}

function precinctOn()  { return PRECINCT.some(function(c){ return S.toggles[c]; }); }
function togglePrec(v) { PRECINCT.forEach(function(c){ S.toggles[c]=v; }); }

function precinctCapex() {
  var FIT=4500, t=0;
  if (S.toggles.P4||S.toggles.P7) t+=(5000+5425+3500)*FIT;
  if (PRECINCT.some(function(c){ return S.toggles[c]; })) t+=3264*FIT;
  return t;
}

function precinctRev1() { return PRECINCT.reduce(function(s,c){ return s+rev1(c); },0); }
function precinctRev5() { return [0,1,2,3,4].map(function(i){ return PRECINCT.reduce(function(s,c){ return s+rev5(c)[i]; },0); }); }
function precinctE5()   { return [0,1,2,3,4].map(function(i){ return PRECINCT.reduce(function(s,c){ return s+ebitda5(c)[i]; },0); }); }

function precinctPayback() {
  var cap=precinctCapex(), avg=precinctE5().reduce(function(s,v){ return s+v; },0)/5;
  return avg>0 ? cap/avg : null;
}
function prodPayback(c) {
  var cap=prodCapex(c); if (!cap||!S.toggles[c]) return null;
  var avg=ebitda5(c).reduce(function(s,v){ return s+v; },0)/5;
  return avg>0 ? cap/avg : null;
}

// ── FORMAT ───────────────────────────────────────────────────────────────────
function fCr(v) {
  var cr=v/1e7;
  if (cr>=100) return '₹'+Math.round(cr)+' Cr';
  if (cr>=10)  return '₹'+cr.toFixed(1)+' Cr';
  if (cr>=1)   return '₹'+cr.toFixed(2)+' Cr';
  return '₹'+(v/1e5).toFixed(1)+'L';
}
function fP(v)   { return Math.round(v*100)+'%'; }
function fInr(v) { var n=Math.round(v); if(n>=1e7) return '₹'+(n/1e7).toFixed(1)+' Cr'; if(n>=1e5) return '₹'+(n/1e5).toFixed(1)+'L'; return '₹'+n.toLocaleString('en-IN'); }
function fN(v)   { return Math.round(v).toLocaleString('en-IN'); }
function fSl(v, fmt) { if(fmt==='pct') return fP(v); if(fmt==='inr') return fInr(v); return fN(v); }
function gA(sc, k) { return sc==='a' ? S.a[k] : S.a[sc][k]; }
function sA(sc, k, v) { if(sc==='a') S.a[k]=v; else S.a[sc][k]=v; }

// ── KPI ───────────────────────────────────────────────────────────────────────
function renderKPI() {
  var y1=CODES.reduce(function(s,c){ return s+rev1(c); },0);
  var r5=totalRev5(), e5=totalE5();
  var tot5=r5.reduce(function(s,v){ return s+v; },0);
  var etot5=e5.reduce(function(s,v){ return s+v; },0);
  var cap=totalCapex(), avg=etot5/5, pb=avg>0?cap/avg:null;
  var active=CODES.filter(function(c){ return S.toggles[c]; }).length;
  document.getElementById('ky1').textContent=fCr(y1);
  document.getElementById('ky1s').textContent=active+' product'+(active!==1?'s':'')+' active';
  document.getElementById('k5r').textContent=fCr(tot5);
  document.getElementById('k5e').textContent=fCr(etot5);
  document.getElementById('kem').textContent=tot5>0?Math.round(etot5/tot5*100)+'% EBITDA margin':'—';
  document.getElementById('kcx').textContent=fCr(cap);
  document.getElementById('kpb').textContent=pb?pb.toFixed(1)+' yr payback':'—';
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  var sb = document.getElementById('sb');
  var html = '<div class="sbh"><span>Products</span><span class="sbov" id="sbov-btn">Overview</span></div>';

  function rowHTML(code, codeLabel, nameLabel, viewKey, indented) {
    var on=S.toggles[code], act=(S.view===viewKey);
    var rv=on?fCr(rev1(code)):'—';
    var cls='pr'+(act?' act':'')+(on?'':' off');
    return '<div class="'+cls+'" data-view="'+viewKey+'" data-toggle="'+code+'" style="'+(indented?'padding-left:22px':'')+'">'
      +'<span class="pcode" style="'+(indented?'font-size:9px;min-width:20px;':'')+'">'+codeLabel+'</span>'
      +'<span class="pname" style="'+(indented?'font-size:11px;':'')+'">'+nameLabel+'</span>'
      +'<span class="prev">'+rv+'</span>'
      +'<div class="tog '+(on?'on':'off')+'"><div class="togdot"></div></div>'
      +'</div>';
  }

  // Standalone products
  ['F1','P1','P3','P6','P2'].forEach(function(c) {
    html += rowHTML(c, c, META[c].name, c, false);
  });

  // Precinct group
  var pOn=precinctOn(), pAct=(S.view==='PRECINCT');
  html += '<div class="sbgrp">Commercial Precinct</div>';
  html += '<div class="pr'+(pAct?' act':'')+(pOn?'':' off')+'" data-view="PRECINCT" data-bundle="1">'
    +'<span class="pcode">P4–8</span>'
    +'<span class="pname">All precinct</span>'
    +'<span class="prev">'+(pOn?fCr(precinctRev1()):'—')+'</span>'
    +'<div class="tog '+(pOn?'on':'off')+'"><div class="togdot"></div></div>'
    +'</div>';
  PRECINCT.forEach(function(c) {
    html += rowHTML(c, c, META[c].name, 'PRECINCT', true);
  });

  sb.innerHTML = html;

  // Events
  document.getElementById('sbov-btn').addEventListener('click', function(e) {
    e.stopPropagation();
    S.view='overview'; render();
  });
  sb.querySelectorAll('.pr').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.tog')) return;
      S.view = el.dataset.view; render();
    });
    var tog = el.querySelector('.tog');
    tog.addEventListener('click', function(e) {
      e.stopPropagation();
      if (el.dataset.bundle) {
        togglePrec(precinctOn()?0:1);
        if (!precinctOn() && S.view==='PRECINCT') S.view='overview';
      } else {
        var c=el.dataset.toggle;
        S.toggles[c]=S.toggles[c]?0:1;
        if (!S.toggles[c] && S.view===c) S.view='overview';
      }
      render();
    });
  });
}

      +'<div class="oc"><div class="ocl">Activity zone</div><div class="ocn">'+fCr(act)+'</div></div></div>'
      +'<div class="ogrid c2"><div class="oc"><div class="ocl">Audio tour</div><div class="ocn">'+fCr(aud)+'</div></div>'
      +'<div class="oc"><div class="ocl">5-year total</div><div class="ocn">'+fCr(yrs.reduce(function(s,v){ return s+v; },0))+'</div></div></div>';
  }
  if (code==='P4') {
    var p=S.a.P4, uc1=p.uc1G*p.uc1P*p.uc1D*p.uc1E, uc2=p.uc2G*p.uc2P*p.uc2E;
    return '<div class="ogrid c3"><div class="oc hero"><div class="ocl">Year 1 total</div><div class="ocn">'+fCr(r)+'</div><div class="ocs">'+fP(1-op)+' EBITDA</div></div>'
      +'<div class="oc"><div class="ocl">UC1 Retreat</div><div class="ocn">'+fCr(uc1)+'</div><div class="ocs">'+p.uc1E+' events</div></div>'
      +'<div class="oc"><div class="ocl">UC2 Cricket day</div><div class="ocn">'+fCr(uc2)+'</div><div class="ocs">'+p.uc2E+' events</div></div></div>';
  }
  if (code==='P5') {
    var p=S.a.P5, gross=p.covers*p.spend*(p.days-p.matchDays)+p.covers*p.spend*p.uplift*p.matchDays;
    var fixed=p.fixedFee*12, share=Math.max(0,(gross-p.threshold)*p.sharePct);
    return '<div class="ogrid c3"><div class="oc hero"><div class="ocl">HPCA income yr 1</div><div class="ocn">'+fCr(r)+'</div><div class="ocs">'+fP(1-op)+' EBITDA</div></div>'
      +'<div class="oc"><div class="ocl">Fixed license</div><div class="ocn">'+fCr(fixed)+'</div></div>'
      +'<div class="oc"><div class="ocl">Revenue share</div><div class="ocn">'+fCr(share)+'</div><div class="ocs">on '+fCr(gross)+' turnover</div></div></div>';
  }
  if (code==='P6') {
    var p=S.a.P6, t1=p.t1w*p.t1f, t2=p.t2w*p.t2f;
    return '<div class="ogrid c3"><div class="oc hero"><div class="ocl">Year 1 total</div><div class="ocn">'+fCr(r)+'</div><div class="ocs">'+fP(1-op)+' EBITDA</div></div>'
      +'<div class="oc"><div class="ocl">Tier 1 residencies</div><div class="ocn">'+fCr(t1)+'</div><div class="ocs">'+p.t1w+' weeks</div></div>'
      +'<div class="oc"><div class="ocl">Tier 2 — IPL</div><div class="ocn">'+fCr(t2)+'</div><div class="ocs">'+p.t2w+' weeks</div></div></div>';
  }
  if (code==='F1') {
    var p=S.a.F1;
    return '<div class="ogrid c3"><div class="oc hero"><div class="ocl">Year 1 (boxes only)</div><div class="ocn">'+fCr(r)+'</div><div class="ocs">'+p.boxes+' \xd7 '+fInr(p.boxFee)+'</div></div>'
      +'<div class="oc"><div class="ocl">Yr 2+ matches/yr</div><div class="ocn">'+fCr(p.matches*p.matchRev)+'</div><div class="ocs">'+p.matches+' matches</div></div>'
      +'<div class="oc"><div class="ocl">Naming rights/yr</div><div class="ocn">'+fCr(p.naming)+'</div></div></div>'
      +'<div class="notebox">Year 1 = box packages only. Expansion revenue (matches + naming) activates Year 2. Year 2 total: '+fCr(yrs[1])+'</div>';
  }
  // default
  return '<div class="ogrid c3"><div class="oc hero"><div class="ocl">Year 1 total</div><div class="ocn">'+fCr(r)+'</div><div class="ocs">'+fP(1-op)+' EBITDA</div></div>'
    +'<div class="oc"><div class="ocl">5-yr total</div><div class="ocn">'+fCr(yrs.reduce(function(s,v){ return s+v; },0))+'</div></div>'
    +'<div class="oc"><div class="ocl">5-yr EBITDA</div><div class="ocn">'+fCr(ebitda5(code).reduce(function(s,v){ return s+v; },0))+'</div></div></div>';
}

function buildCapex(code) {
  var cap=prodCapex(code);
  var desc={P1:'18,500 sqft structure + 18,500 sqft fit-out at ₹4,500/sqft',P2:'10,000 sqft structure + 10,000 sqft fit-out at ₹4,500/sqft',P6:'ESP Wellness all-in package · specialist equipment + recovery tech',F1:'New seating, shade canopy, concourse, facade, floodlights'};
  var shared={P3:'No dedicated capex — uses existing infrastructure',P4:'Shared: conference hall + banquet + bar + boxes (in precinct total)',P5:'Shared: VIP Pavilion Bar fit-out — part of precinct capex',P7:'Shared: conference hall + banquet hall + bar (in precinct total)',P8:'No dedicated capex — uses existing boxes and facilities'};
  if (cap!==null) {
    return '<div class="cxrow"><div class="cx"><div class="cxl">Dedicated capex</div><div class="cxn">'+fCr(cap)+'</div><div class="cxs">'+(desc[code]||'')+'</div></div>'
      +'<div class="cx"><div class="cxl">Programme payback</div><div class="cxn">'+(prodPayback(code)?prodPayback(code).toFixed(1)+' yrs':'—')+'</div><div class="cxs">capex \xf7 avg annual EBITDA</div></div></div>';
  }
  return '<div class="cxrow"><div class="cx" style="grid-column:1/-1"><div class="cxl">Capex note</div><div class="cxn" style="font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0">'+(shared[code]||'')+'</div></div></div>';
}

// ── PRODUCT DETAIL ────────────────────────────────────────────────────────────
function renderProduct(code) {
  var meta=META[code], on=S.toggles[code];
  var ALL=['F1','P1','P3','P6','P2'];
  var idx=ALL.indexOf(code), prev=ALL[idx>0?idx-1:ALL.length-1], next=ALL[idx<ALL.length-1?idx+1:0];

  var rightHTML = on
    ? '<div class="coltit">Output</div>'+buildOutputCards(code)
      +'<div class="coltit" style="margin-top:16px">5-year revenue &amp; EBITDA</div>'+buildYstrip(code)
      +'<div class="coltit" style="margin-top:16px">Capital investment</div>'+buildCapex(code)
    : '<div class="offst"><h3>'+meta.full+' is off</h3><p>Toggle on to edit assumptions and see output.</p></div>';

  var leftHTML = on
    ? '<div class="coltit">Assumptions</div>'+buildSliders(code)
    : '<div class="offst"><h3>Product is off</h3><p>Turn on using the toggle above.</p></div>';

  document.getElementById('panel').innerHTML =
    '<div class="pd">'
    +'<div class="pdh"><div>'
      +'<div class="pdey">'+code+' — '+meta.full+'</div>'
      +'<div class="pdtit">'+meta.name+'</div>'
      +'<div class="pdsub">'+meta.sub+'</div>'
      +'<div class="pdtog">'
        +'<span class="pdtogl">'+(on?'Active':'Inactive')+'</span>'
        +'<div class="bigt '+(on?'on':'off')+'" id="pd-tog"><div class="bigtdot"></div></div>'
      +'</div>'
    +'</div></div>'
    +'<div class="pdbody">'
      +'<div class="pdcol left">'+leftHTML+'</div>'
      +'<div class="pdcol right">'+rightHTML+'</div>'
    +'</div>'
    +'<div class="pdfooter">'
      +'<span class="pdnav" data-go="'+prev+'">← '+prev+' '+META[prev].name+'</span>'
      +'<span class="pdhint">Sliders update live</span>'
      +'<span class="pdnav" data-go="'+next+'">'+META[next].name+' '+next+' →</span>'
    +'</div>'
    +'</div>';

  document.getElementById('pd-tog').addEventListener('click', function() {
    S.toggles[code]=S.toggles[code]?0:1; render();
  });
  document.querySelectorAll('.pdnav[data-go]').forEach(function(el) {
    el.addEventListener('click', function() { S.view=el.dataset.go; render(); });
  });
  attachSliders(function() {
    var right=document.querySelector('.pdcol.right');
    if (right && S.toggles[code]) {
      right.innerHTML='<div class="coltit">Output</div>'+buildOutputCards(code)
        +'<div class="coltit" style="margin-top:16px">5-year revenue &amp; EBITDA</div>'+buildYstrip(code)
        +'<div class="coltit" style="margin-top:16px">Capital investment</div>'+buildCapex(code);
    }
  });
}

// ── PRECINCT DETAIL ───────────────────────────────────────────────────────────
function renderPrecinct() {
  var pOn=precinctOn();
  var pR1=precinctRev1(), pR5=precinctRev5(), pE5=precinctE5();
  var pT5=pR5.reduce(function(s,v){ return s+v; },0), pET5=pE5.reduce(function(s,v){ return s+v; },0);
  var pCap=precinctCapex(), pPb=precinctPayback();
  var pM=pT5>0?Math.round(pET5/pT5*100):0;
  var LBL=['Year 1','Year 2','Year 3','Year 4','Year 5'];
  var FIT=4500;

  var kpiHTML='<div class="pkbar">'
    +'<div class="pk hero"><div class="pkl">Year 1 revenue</div><div class="pkn">'+(pOn?fCr(pR1):'—')+'</div></div>'
    +'<div class="pk"><div class="pkl">5-year revenue</div><div class="pkn">'+(pOn?fCr(pT5):'—')+'</div></div>'
    +'<div class="pk"><div class="pkl">Total capex</div><div class="pkn red">'+fCr(pCap)+'</div><div class="pks">shared infrastructure</div></div>'
    +'<div class="pk"><div class="pkl">Payback period</div><div class="pkn">'+(pOn&&pPb?pPb.toFixed(1)+' yrs':'—')+'</div><div class="pks">'+(pM?pM+'% EBITDA margin':'')+'</div></div>'
    +'</div>';

  var stripHTML='<div class="ystrip">'+pR5.map(function(v,i){
    return '<div class="yc'+(i===0?' y1':'')+'"><div class="ycl">'+LBL[i]+'</div><div class="ycn">'+(pOn?fCr(v):'—')+'</div><div class="yce">'+(pOn?fCr(pE5[i]):'')+'</div></div>';
  }).join('')+'</div>';

  var prodTableHTML='<table class="ytable" style="margin-bottom:14px">'
    +'<thead><tr><th style="text-align:left">Product</th><th>Year 1</th><th>5-yr Rev</th><th>EBITDA</th></tr></thead>'
    +'<tbody>'+PRECINCT.map(function(c){
      var on=S.toggles[c], r=rev1(c), t5=rev5(c).reduce(function(s,v){ return s+v; },0), op=S.a[c]?S.a[c].opex:0;
      return '<tr'+(on?'':' style="opacity:.4"')+'>'
        +'<td style="text-align:left;font-size:11px;font-weight:600">'+c+' '+META[c].name+'</td>'
        +'<td>'+(on?fCr(r):'—')+'</td><td>'+(on?fCr(t5):'—')+'</td><td>'+(on?fP(1-op):'—')+'</td>'
        +'</tr>';
    }).join('')+'</tbody></table>';

  var capexHTML='<div class="cxrow" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="cx"><div class="cxl">Conference hall</div><div class="cxn">'+fCr(5000*FIT)+'</div><div class="cxs">5,000 sqft \xd7 ₹4,500/sqft</div></div>'
    +'<div class="cx"><div class="cxl">Banquet hall</div><div class="cxn">'+fCr(5425*FIT)+'</div><div class="cxs">5,425 sqft \xd7 ₹4,500/sqft</div></div>'
    +'<div class="cx"><div class="cxl">Bar + boxes shell</div><div class="cxn">'+fCr((3500+3264)*FIT)+'</div><div class="cxs">3,500 + 3,264 sqft</div></div>'
    +'</div>';

  // Sliders for each precinct product
  var slidersHTML=PRECINCT.map(function(c){
    var on=S.toggles[c];
    return '<div class="ppblk">'
      +'<div class="ppblkh"><span class="ppblkt">'+c+' — '+META[c].name+'</span><span class="ppblkv">'+(on?fCr(rev1(c)):'off')+'</span></div>'
      +(on ? buildSliders(c) : '<div style="font-size:11px;color:var(--muted);padding:6px 0">Product is off — toggle in sidebar to activate.</div>')
      +'</div>';
  }).join('');

  document.getElementById('panel').innerHTML =
    '<div class="pd">'
    +'<div class="pdh"><div>'
      +'<div class="pdey">Commercial Precinct · P4 P5 P7 P8</div>'
      +'<div class="pdtit">Commercial Precinct</div>'
      +'<div class="pdsub">Conference · Dining · Weddings & Events · VIP Membership · shared infrastructure</div>'
      +'<div class="pdtog"><span class="pdtogl">'+(pOn?'Active':'Inactive')+'</span>'
        +'<div class="bigt '+(pOn?'on':'off')+'" id="prec-tog"><div class="bigtdot"></div></div>'
      +'</div>'
    +'</div></div>'
    +'<div class="pdbody">'
      +'<div class="pdcol left"><div class="coltit">Assumptions by product</div>'+slidersHTML+'</div>'
      +'<div class="pdcol right" id="prec-right">'
        +'<div class="coltit">Precinct performance</div>'
        +kpiHTML
        +'<div class="coltit" style="margin-top:16px">5-year revenue &amp; EBITDA</div>'
        +stripHTML
        +'<div class="coltit" style="margin-top:16px">Per-product breakdown</div>'
        +prodTableHTML
        +'<div class="coltit" style="margin-top:16px">Capex breakdown · '+fCr(pCap)+' total</div>'
        +capexHTML
      +'</div>'
    +'</div>'
    +'<div class="pdfooter">'
      +'<span class="pdnav" id="prec-back">← Overview</span>'
      +'<span class="pdhint">Sliders update live</span>'
      +'<span class="pdnav" id="prec-next">P6 HP Training →</span>'
    +'</div>'
    +'</div>';

  document.getElementById('prec-tog').addEventListener('click', function() {
    togglePrec(precinctOn()?0:1); render();
  });
  document.getElementById('prec-back').addEventListener('click', function() { S.view='overview'; render(); });
  document.getElementById('prec-next').addEventListener('click', function() { S.view='P6'; render(); });

  attachSliders(function() {
    // Refresh right panel
    var pR5b=precinctRev5(), pE5b=precinctE5();
    var pT5b=pR5b.reduce(function(s,v){ return s+v; },0), pET5b=pE5b.reduce(function(s,v){ return s+v; },0);
    var pPb2=precinctPayback(), pM2=pT5b>0?Math.round(pET5b/pT5b*100):0;
    var pR1b=precinctRev1(), pCap2=precinctCapex();
    var right=document.getElementById('prec-right');
    if (!right) return;
    right.innerHTML='<div class="coltit">Precinct performance</div>'
      +'<div class="pkbar">'
        +'<div class="pk hero"><div class="pkl">Year 1 revenue</div><div class="pkn">'+fCr(pR1b)+'</div></div>'
        +'<div class="pk"><div class="pkl">5-year revenue</div><div class="pkn">'+fCr(pT5b)+'</div></div>'
        +'<div class="pk"><div class="pkl">Total capex</div><div class="pkn red">'+fCr(pCap2)+'</div><div class="pks">shared infrastructure</div></div>'
        +'<div class="pk"><div class="pkl">Payback period</div><div class="pkn">'+(pPb2?pPb2.toFixed(1)+' yrs':'—')+'</div><div class="pks">'+(pM2?pM2+'% EBITDA margin':'')+'</div></div>'
      +'</div>'
      +'<div class="coltit" style="margin-top:16px">5-year revenue &amp; EBITDA</div>'
      +'<div class="ystrip">'+pR5b.map(function(v,i){
          return '<div class="yc'+(i===0?' y1':'')+'"><div class="ycl">'+LBL[i]+'</div><div class="ycn">'+fCr(v)+'</div><div class="yce">'+fCr(pE5b[i])+'</div></div>';
        }).join('')+'</div>'
      +'<div class="coltit" style="margin-top:16px">Per-product breakdown</div>'
      +'<table class="ytable" style="margin-bottom:14px"><thead><tr><th style="text-align:left">Product</th><th>Year 1</th><th>5-yr Rev</th><th>EBITDA</th></tr></thead><tbody>'
      +PRECINCT.map(function(c){
          var on=S.toggles[c], r=rev1(c), t5=rev5(c).reduce(function(s,v){ return s+v; },0), op=S.a[c]?S.a[c].opex:0;
          return '<tr'+(on?'':' style="opacity:.4"')+'><td style="text-align:left;font-size:11px;font-weight:600">'+c+' '+META[c].name+'</td><td>'+(on?fCr(r):'—')+'</td><td>'+(on?fCr(t5):'—')+'</td><td>'+(on?fP(1-op):'—')+'</td></tr>';
        }).join('')
      +'</tbody></table>'
      +'<div class="coltit" style="margin-top:16px">Capex breakdown · '+fCr(pCap2)+' total</div>'
      +capexHTML;
  });
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderKPI();
  renderSidebar();
  if (S.view==='overview')   renderOverview();
  else if (S.view==='PRECINCT') renderPrecinct();
  else renderProduct(S.view);
}

document.getElementById('logo-home').addEventListener('click', function() { S.view='overview'; render(); });
render();
</script>
</body>
</html>
